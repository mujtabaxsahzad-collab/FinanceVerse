    <link rel="stylesheet" href="../CSS/style.css">
</head>
<body>
    <!-- Header and Navigation -->
    <header class="site-header"><nav class="navbar"><a href="index.html" class="logo">FinanceVerse</a><button class="menu-toggle" aria-label="Open navigation">☰</button><ul class="nav-links"><li><a href="index.html">Home</a></li><li><a href="investments.html">Investing</a></li><li><a href="trading.html">Trading</a></li><li><a href="banking.html">Banking</a></li><li><a href="risks.html">Risks</a></li><li><a href="news.html">News</a></li><li><a href="calculators.html">Calculators</a></li><li><a href="support.html">Support</a></li><li><a href="login.html" class="nav-button">Login</a></li></ul></nav></header>

    <!-- Signup Section -->
    <main class="auth-page">
        <form id="signupForm" class="auth-card">
            <h1>Create Account</h1>
            <input type="text" id="signupName" placeholder="Full Name">
            <input type="email" id="signupEmail" placeholder="Email">
            <input type="tel" id="signupPhone" placeholder="Phone">
            <input type="password" id="signupPassword" placeholder="Password">
            <input type="password" id="signupConfirmPassword" placeholder="Confirm Password">
            <label class="check-row"><input type="checkbox" id="termsCheck"> I accept the terms</label>
            <button type="submit" class="primary-button">Signup</button>
            <p class="result" id="signupResult"></p>
            <p>Already have an account? <a href="login.html">Login</a></p>
        </form>
    </main>

    <!-- Footer Section -->
    <footer class="site-footer"><div class="footer-brand"><p>FinanceVerse</p><p>Education only. Not financial advice.</p></div><div class="footer-socials"><a href="https://t.me/yourchannel" target="_blank"><i class="fa-brands fa-telegram"></i>Telegram</a><a href="https://instagram.com/yourprofile" target="_blank"><i class="fa-brands fa-instagram"></i>Instagram</a><a href="https://youtube.com/@yourchannel" target="_blank"><i class="fa-brands fa-youtube"></i>YouTube</a></div><p class="copyright">Copyright 2026 FinanceVerse. All rights reserved.</p></footer>

</body>
